<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipelineIQ Showcase Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-enter-active,
        .fade-leave-active {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
            transform: translateY(10px);
        }

        .task-list-enter-active,
        .task-list-leave-active {
            transition: all 0.4s ease;
        }

        .task-list-enter-from,
        .task-list-leave-to {
            opacity: 0;
            transform: translateX(-30px);
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-gray-900 via-indigo-950 to-gray-900 min-h-screen text-gray-100 antialiased selection:bg-indigo-500 selection:text-white">

    <div id="app" class="max-w-3xl mx-auto pt-16 px-6">
        <div class="text-center mb-12">
            <h1
                class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-300 tracking-tight">
                PipelineIQ Demo</h1>
            <p class="mt-4 text-indigo-200/70 text-lg">Test your autonomous CI Repair Agent with this visually modern
                showcase.</p>
        </div>

        <div class="glass rounded-2xl p-8 shadow-2xl shadow-indigo-900/20 mb-8 overflow-hidden relative">
            <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
            <div class="absolute bottom-0 left-0 w-40 h-40 bg-cyan-500/10 rounded-full blur-3xl -ml-10 -mb-10"></div>

            <form @submit.prevent="addTask" class="relative z-10 flex gap-4">
                <input v-model="newTaskTitle" type="text" placeholder="What needs to be fixed?"
                    class="flex-1 bg-gray-800/50 border border-gray-700 rounded-xl px-5 py-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-gray-800 transition-all font-medium">
                <button type="submit" :disabled="!newTaskTitle.trim() || isLoading"
                    class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white px-8 py-4 rounded-xl font-semibold transition-all shadow-lg hover:shadow-indigo-500/25 active:scale-95 flex items-center gap-2">
                    <svg v-if="!isLoading" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20"
                        fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
                            clip-rule="evenodd" />
                    </svg>
                    <svg v-else class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Add
                </button>
            </form>

            <Transition name="fade">
                <div v-if="error"
                    class="mt-4 p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 font-medium text-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                            clip-rule="evenodd" />
                    </svg>
                    {{ error }}
                </div>
            </Transition>
        </div>

        <div class="space-y-4 relative z-10 pb-20">
            <TransitionGroup name="task-list">
                <div v-for="task in tasks" :key="task.id"
                    class="glass rounded-xl p-5 flex items-center justify-between group hover:bg-gray-800/40 transition-all duration-300">
                    <div class="flex items-center gap-4 flex-1">
                        <button @click="toggleTask(task)"
                            class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all focus:outline-none"
                            :class="task.completed ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-gray-500 hover:border-indigo-400 text-transparent'">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                    d="M5 13l4 4L19 7"></path>
                            </svg>
                        </button>
                        <span class="font-medium text-lg transition-all"
                            :class="task.completed ? 'text-gray-500 line-through' : 'text-gray-100'">
                            {{ task.title }}
                        </span>
                    </div>
                    <button @click="deleteTask(task.id)"
                        class="opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 transition-all p-2 rounded-lg hover:bg-red-500/10 focus:outline-none focus:opacity-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </TransitionGroup>

            <div v-if="tasks.length === 0 && !isFetching" class="text-center py-16 text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 opacity-50" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
                <p class="text-lg">No tasks yet. Add one to test the pipeline!</p>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue

        createApp({
            setup() {
                const tasks = ref([])
                const newTaskTitle = ref('')
                const isLoading = ref(false)
                const isFetching = ref(true)
                const error = ref('')

                const fetchTasks = async () => {
                    isFetching.value = true;
                    try {
                        const res = await fetch('/api/tasks')
                        tasks.value = await res.json()
                    } catch (e) {
                        error.value = "Failed to connect to the backend. Is FastAPI running?"
                    } finally {
                        isFetching.value = false;
                    }
                }

                const addTask = async () => {
                    if (!newTaskTitle.value.trim()) return;
                    isLoading.value = true;
                    error.value = '';
                    try {
                        const res = await fetch('/api/tasks', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ title: newTaskTitle.value })
                        });
                        if (!res.ok) throw new Error("Failed to add task")
                        const task = await res.json()
                        tasks.value.push(task)
                        newTaskTitle.value = ''
                    } catch (e) {
                        error.value = e.message
                    } finally {
                        isLoading.value = false
                    }
                }

                const toggleTask = async (task) => {
                    try {
                        const res = await fetch(`/api/tasks/${task.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ completed: !task.completed })
                        })
                        if (res.ok) task.completed = !task.completed
                    } catch (e) {
                        error.value = "Failed to update task"
                    }
                }

                const deleteTask = async (id) => {
                    try {
                        const res = await fetch(`/api/tasks/${id}`, { method: 'DELETE' })
                        if (res.ok) {
                            tasks.value = tasks.value.filter(t => t.id !== id)
                        }
                    } catch (e) {
                        error.value = "Failed to delete task"
                    }
                }

                onMounted(() => {
                    fetchTasks()
                })

                return { tasks, newTaskTitle, addTask, toggleTask, deleteTask, isLoading, isFetching, error }
            }
        }).mount('#app')
    </script>
</body>

</html>
